name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      # CI runs against plain Postgres+pgvector, not Supabase's own image, so the
      # `auth` schema and `auth.uid()` (used as the users.id default) don't exist
      # there yet — stub them before migrating. Real environments (local Docker
      # Compose, hosted Supabase) provide these already.
      - name: Stub Supabase auth.uid() for CI's plain Postgres
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c "
            CREATE SCHEMA IF NOT EXISTS auth;
            CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE sql STABLE AS \$\$ SELECT NULL::uuid \$\$;
          "
      - run: npx prisma migrate deploy
      - run: npm run test:unit
      - run: npm run test:integration

  e2e:
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    env:
      # Same fixed local-dev demo JWT/keys docker/.env.example documents (Supabase CLI's
      # public demo values, safe to commit — never used against a real project).
      DATABASE_URL: "postgresql://postgres:postgres@localhost:54322/postgres"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:54322/postgres"
      NEXT_PUBLIC_SUPABASE_URL: "http://127.0.0.1:54321"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE"
      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtZGVtbyIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q"
      OWNER_EMAILS: "owner@example.com"
      HUGGINGFACE_API_TOKEN: ${{ secrets.HUGGINGFACE_API_TOKEN }}
      # Keeps tests/e2e/generate.spec.ts hermetic (a hand-rolled mock model, not a real HF
      # call) per ai/AGENTS.md 9.3 — the knowledge-search e2e test is unaffected, since this
      # only swaps the generation model-router branch, not embeddings/reranking.
      E2E_MOCK_LLM: "1"
      # Lets tests/e2e/schedule.spec.ts authenticate its cron-dispatch call the same way
      # app/api/cron/dispatch-publishing/route.ts verifies it — a CI-only fixed value, never
      # used against a real deployment.
      CRON_SECRET: "ci-only-cron-secret-not-used-in-production"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      # Reuse the same docker/docker-compose.yml local dev already runs against, instead of
      # hand-translating its 9 services + depends_on/healthcheck graph into raw GH Actions
      # `services:` blocks (which don't support inter-service depends_on at all). Only bring up
      # what login + hybrid search touch: db, auth (GoTrue), kong (routes /auth/v1/*), mailpit
      # (catches the magic-link email); kong's `depends_on: studio` transitively starts
      # studio/meta/rest too. realtime/storage/functions are left out — unused by these tests.
      - name: Start local Supabase stack (db, auth, kong, mailpit)
        working-directory: docker
        run: |
          cp .env.example .env
          cat >> .env <<'EOF'
          ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiIsImlzcyI6InN1cGFiYXNlLWRlbW8iLCJpYXQiOjE2NDE3NjkyMDAsImV4cCI6MTc5OTUzNTYwMH0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE
          SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIiwiaXNzIjoic3VwYWJhc2UtZGVtbyIsImlhdCI6MTY0MTc2OTIwMCwiZXhwIjoxNzk5NTM1NjAwfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q
          SECRET_KEY_BASE=ci-only-secret-key-base-not-used-by-login-or-search-tests-000000
          GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID=ci-placeholder
          GOTRUE_EXTERNAL_GOOGLE_SECRET=ci-placeholder
          GOTRUE_EXTERNAL_GITHUB_CLIENT_ID=ci-placeholder
          GOTRUE_EXTERNAL_GITHUB_SECRET=ci-placeholder
          EOF
          # public.ecr.aws anonymous pulls are rate-limited and shared GitHub-hosted runner
          # IPs hit that limit often. Pulling all 7 images at once (docker compose pull's
          # default) bursts enough requests to trip it even across retries, so pull one
          # image at a time with its own backoff to spread requests out.
          for svc in db auth kong mailpit studio meta rest; do
            for attempt in 1 2 3 4 5 6; do
              docker compose --env-file .env -f docker-compose.yml pull "$svc" && break
              echo "Pull of $svc failed (attempt $attempt, likely an ECR rate limit), retrying in 30s..."
              sleep 30
            done
          done
          docker compose --env-file .env -f docker-compose.yml up -d --wait db auth kong mailpit
      - run: npx prisma migrate deploy
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm audit --audit-level=high
      - uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, severity: HIGH,CRITICAL }

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          # Match the security-scan job's threshold — moderate-severity
          # transitive advisories (e.g. Next.js's own postcss dependency)
          # don't block a PR here either.
          fail-on-severity: high
